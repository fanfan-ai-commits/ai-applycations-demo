<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由落体教学模拟器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <!-- 主容器 -->
    <div class="container mx-auto px-2 py-4 max-w-7xl">
        
        <!-- 标题 -->
        <h1 class="text-2xl font-bold text-center mb-4">
            🌍 自由落体教学模拟器
        </h1>
        
        <!-- 第一行：动画演示 + 控制面板 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-3 mb-3">
            
            <!-- 动画演示 -->
            <div class="lg:col-span-2 bg-slate-800 rounded-lg p-4 shadow-lg">
                <h2 class="text-lg font-semibold mb-2">🏗️ 动画演示</h2>
                
                <!-- 动画画布 -->
                <div class="relative bg-gradient-to-b h-[85%] from-blue-900 via-sky-800 to-amber-700 rounded-lg overflow-hidden" 
                     id="animationContainer">
                    
                    <!-- 高度标记 -->
                    <div class="absolute left-1 top-0 bottom-0 flex flex-col justify-between py-2 text-xs text-white/50 z-10">
                        <span id="heightTop">100m</span>
                        <span id="heightMid">50m</span>
                        <span>0m</span>
                    </div>
                    
                    <!-- 动画画布 -->
                    <canvas id="animationCanvas" class="w-full h-full" style="min-height: 200px;"></canvas>
                    
                    <!-- 碰撞效果提示 -->
                    <div id="collisionAlert" class="absolute inset-0 flex items-center justify-center hidden z-20">
                        <div class="bg-red-500/80 text-white px-6 py-3 rounded-xl text-xl font-bold animate-bounce">
                            💥 撞击地面！
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 控制面板 -->
            <div class="bg-slate-800 rounded-lg p-4 shadow-lg">
                <h2 class="text-lg font-semibold mb-2">🎮 控制面板</h2>
                
                <!-- 按钮组 -->
                <div class="flex gap-2 mb-3">
                    <button id="btnStart" class="flex-1 bg-green-500 hover:bg-green-600 py-2 rounded-lg font-semibold text-sm transition">
                        ▶ 开始
                    </button>
                    <button id="btnReset" class="flex-1 bg-red-500 hover:bg-red-600 py-2 rounded-lg font-semibold text-sm transition">
                        ↺ 重置
                    </button>
                </div>
                
                <!-- 星球选择 -->
                <div class="mb-3">
                    <label class="block text-xs text-slate-400 mb-1">🌍 选择星球</label>
                    <select id="planetSelect" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-1.5 text-sm">
                        <option value="9.8">地球 (g = 9.8 m/s²)</option>
                        <option value="1.6">月球 (g = 1.6 m/s²)</option>
                        <option value="3.7">火星 (g = 3.7 m/s²)</option>
                        <option value="24.8">木星 (g = 24.8 m/s²)</option>
                        <option value="10.4">土星 (g = 10.4 m/s²)</option>
                        <option value="3.3">金星 (g = 3.3 m/s²)</option>
                        <option value="0.59">冥王星 (g = 0.59 m/s²)</option>
                    </select>
                </div>
                
                <!-- 高度设置 -->
                <div class="mb-3">
                    <label class="block text-xs text-slate-400 mb-1">
                        📏 下落高度: <span id="heightValue">50</span> m
                    </label>
                    <input type="range" id="heightRange" min="10" max="100" value="50" 
                           class="w-full h-1.5 bg-slate-600 rounded-lg appearance-none cursor-pointer">
                </div>
                
                <!-- 时间流速 -->
                <div class="mb-3">
                    <label class="block text-xs text-slate-400 mb-1">
                        ⏱️ 时间流速(慢放or快放): <span id="speedValue">1.0</span>x
                    </label>
                    <input type="range" id="speedRange" min="0.1" max="2" step="0.1" value="1" 
                           class="w-full h-1.5 bg-slate-600 rounded-lg appearance-none cursor-pointer">
                </div>
                
                <!-- 预计下落时间 -->
                <div class="bg-slate-700 rounded p-2 text-center">
                    <div class="text-xs text-slate-400">预计下落时间</div>
                    <div id="estimatedTime" class="text-xl font-bold text-blue-400">--</div>
                </div>
            </div>
        </div>
        
        <!-- 第二行：实时数据 -->
        <div class="bg-slate-800 rounded-lg p-4 shadow-lg mb-3">
            <h2 class="text-lg font-semibold mb-2">📊 实时数据</h2>
            
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-slate-700 rounded p-3 text-center">
                    <div class="text-xs text-slate-400">⏱️ 时间 (t)</div>
                    <div id="displayTime" class="text-xl font-mono">0.00 s</div>
                </div>
                
                <div class="bg-slate-700 rounded p-3 text-center">
                    <div class="text-xs text-slate-400">🚀 末速度 (Vt = gt)</div>
                    <div id="displayVelocity" class="text-xl font-mono">0.00 m/s</div>
                    <div id="velocityFormula" class="text-xs text-slate-500">Vt = 9.8 × 0.00</div>
                </div>
                
                <div class="bg-slate-700 rounded p-3 text-center">
                    <div class="text-xs text-slate-400">📏 下落高度 (h = ½gt²)</div>
                    <div id="displayHeight" class="text-xl font-mono">0.00 m</div>
                    <div id="heightFormula" class="text-xs text-slate-500">h = 0.5 × 9.8 × 0.00²</div>
                </div>
            </div>
        </div>
        
        <!-- 第三行：图表区域（带公式） -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 mb-3">
            <!-- 速度-时间图 -->
            <div class="bg-slate-800 rounded-lg p-4 shadow-lg">
                <h2 class="text-lg font-semibold mb-2">📈 速度-时间曲线</h2>
                
                <!-- 速度公式 -->
                <div class="bg-gradient-to-r from-green-900/50 to-green-700/30 rounded p-2 mb-2">
                    <div class="text-center">
                        <div class="text-xs text-green-400 mb-0.5">末速度公式</div>
                        <div class="text-xl font-mono font-bold">Vt = g × t</div>
                    </div>
                </div>
                
                <!-- 图表容器 -->
                <div id="velocityChart" style="width: 100%; height: 220px;"></div>
            </div>
            
            <!-- 高度-时间图 -->
            <div class="bg-slate-800 rounded-lg p-4 shadow-lg">
                <h2 class="text-lg font-semibold mb-2">📈 高度-时间曲线</h2>
                
                <!-- 高度公式 -->
                <div class="bg-gradient-to-r from-purple-900/50 to-purple-700/30 rounded p-2 mb-2">
                    <div class="text-center">
                        <div class="text-xs text-purple-400 mb-0.5">下落高度公式</div>
                        <div class="text-xl font-mono font-bold">h = ½ × g × t²</div>
                    </div>
                </div>
                
                <!-- 图表容器 -->
                <div id="heightChart" style="width: 100%; height: 220px;"></div>
            </div>
        </div>
        
        <!-- 第四行：导出按钮 -->
        <div class="text-center mb-3">
            <button id="btnExport" class="bg-indigo-500 hover:bg-indigo-600 px-6 py-2 rounded-lg font-semibold text-sm transition">
                💾 导出实验记录
            </button>
        </div>
    </div>
      <!-- 页脚 -->
  <footer class="relative z-10 text-center text-gray-400 text-xs py-3">
    &copy; 2026 fanfan.ai工作室
  </footer>
    
    <script src="js/main.js"></script>
</body>
</html>
