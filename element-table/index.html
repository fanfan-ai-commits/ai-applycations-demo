<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 化学导师 - 元素周期表</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }
        
        /* Element Categories Colors */
        .bg-alkali-metal { background-color: #ff6b6b; }
        .bg-alkaline-earth { background-color: #feca57; }
        .bg-transition-metal { background-color: #48dbfb; }
        .bg-post-transition { background-color: #1dd1a1; }
        .bg-metalloid { background-color: #5f27cd; }
        .bg-nonmetal { background-color: #54a0ff; }
        .bg-halogen { background-color: #00d2d3; }
        .bg-noble-gas { background-color: #ff9ff3; }
        .bg-lanthanide { background-color: #ff9f43; }
        .bg-actinide { background-color: #ee5253; }
        .bg-unknown { background-color: #8395a7; }

        .element-tile {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .element-tile:hover {
            transform: scale(1.15);
            z-index: 10;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            cursor: pointer;
        }
        
        /* Grid adjustments for Periodic Table */
        .periodic-grid {
            display: grid;
            grid-template-columns: repeat(18, minmax(0, 1fr));
            gap: 4px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center shadow-md z-20">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-atom text-teal-400 text-2xl"></i>
            <h1 class="text-xl font-bold bg-gradient-to-r from-teal-400 to-blue-500 bg-clip-text text-transparent">AI 化学导师</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="quizBtn" class="text-sm bg-teal-600 hover:bg-teal-500 text-white px-3 py-2 rounded-lg transition-colors flex items-center gap-2">
                <i class="fa-solid fa-brain"></i> 开始测验
            </button>
            <button id="clearChatBtn" class="text-sm text-slate-400 hover:text-white transition-colors">
                <i class="fa-solid fa-trash-can mr-1"></i> 清空对话
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- Left: Periodic Table -->
        <section class="flex-1 p-4 overflow-auto bg-slate-900 relative">
            <!-- Legend -->
            <div class="absolute top-4 right-4 bg-slate-800 p-3 rounded-lg shadow-lg text-xs z-10 border border-slate-700">
                <div class="grid grid-cols-2 gap-2">
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-alkali-metal inline-block"></span> 碱金属</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-alkaline-earth inline-block"></span> 碱土金属</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-transition-metal inline-block"></span> 过渡金属</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-post-transition inline-block"></span> 贫金属</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-metalloid inline-block"></span> 类金属</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-nonmetal inline-block"></span> 非金属</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-halogen inline-block"></span> 卤素</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-noble-gas inline-block"></span> 稀有气体</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-lanthanide inline-block"></span> 镧系</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-actinide inline-block"></span> 锕系</div>
                </div>
            </div>

            <div id="periodicTable" class="periodic-grid w-full min-w-[800px] mx-auto">
                <!-- Elements will be injected here -->
            </div>
        </section>

        <!-- Right: AI Chat -->
        <section class="w-full md:w-[400px] bg-slate-800 border-l border-slate-700 flex flex-col shadow-2xl z-10">
            <!-- Chat Messages -->
            <div id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-4 scroll-smooth">
                <!-- Welcome Message -->
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-robot text-white text-sm"></i>
                    </div>
                    <div class="bg-slate-700 p-3 rounded-lg rounded-tl-none max-w-[85%] text-sm text-slate-200">
                        你好！我是你的 AI 化学导师。点击元素周期表上的任意元素，我会为你详细介绍它。也可以直接问我问题哦！
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-slate-800 border-t border-slate-700">
                <div class="relative">
                    <input type="text" id="userInput" placeholder="Ask about an element..." 
                        class="w-full bg-slate-900 text-white rounded-lg pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500 border border-slate-600 placeholder-slate-500 transition-all"
                        autocomplete="off">
                    <button id="sendBtn" class="absolute right-2 top-1/2 -translate-y-1/2 text-teal-400 hover:text-teal-300 p-1.5 rounded-md transition-colors">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="elements.js"></script>
    <script src="app.js"></script>

    <!-- Element Modal -->
    <div id="elementModal" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-slate-800 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-700 relative">
            <button id="closeModal" class="absolute top-4 right-4 hover:text-white text-slate-400 transition-colors z-10">
                <i class="fa-solid fa-times text-xl"></i>
            </button>
            <div id="modalContent" class="p-6">
                <!-- Content will be injected here -->
            </div>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div id="quizModal" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-slate-800 rounded-2xl w-full max-w-2xl shadow-2xl border border-slate-700 relative">
            <button id="closeQuiz" class="absolute top-4 right-4 hover:text-white text-slate-400 transition-colors z-10">
                <i class="fa-solid fa-times text-xl"></i>
            </button>
            <div id="quizContent" class="p-6">
                <!-- Quiz content will be injected here -->
            </div>
        </div>
    </div>
</body>
</html>
