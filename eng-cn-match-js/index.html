<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中英文配对挑战</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
        }
        /* 自定义卡片点击动画 */
        .card {
            transition: all 0.2s ease;
        }
        .card:active {
            transform: scale(0.98);
        }
        /* 隐藏滚动条但保持功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- ==================== 1. 启动配置页 (Setup Screen) ==================== -->
    <div id="setup-screen" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-bold text-center text-indigo-600 mb-2">⚡ 单词极速配对</h1>
        <p class="text-center text-gray-500 mb-8">初中英语 & 数学 专项练习</p>

        <!-- 学科选择 -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">选择学科 (Subject)</label>
            <div class="grid grid-cols-2 gap-4">
                <button id="btn-subject-english" class="subject-btn py-3 px-4 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-indigo-700 font-bold focus:outline-none ring-2 ring-indigo-300 transition" onclick="selectSubject('english')">
                    🇬🇧 英语 English
                </button>
                <button id="btn-subject-math" class="subject-btn py-3 px-4 rounded-xl border-2 border-gray-200 text-gray-600 font-bold focus:outline-none hover:border-indigo-300 transition" onclick="selectSubject('math')">
                    🔢 数学 Math
                </button>
            </div>
        </div>

        <!-- 难度选择 -->
        <div class="mb-8">
            <label class="block text-sm font-medium text-gray-700 mb-2">选择难度 (Difficulty)</label>
            <div class="space-y-3">
                <button class="difficulty-btn w-full py-3 px-4 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-indigo-700 font-bold focus:outline-none ring-2 ring-indigo-300 transition flex justify-between items-center" onclick="selectDifficulty(12)">
                    <span>简单模式</span>
                    <span class="text-xs bg-indigo-200 px-2 py-1 rounded text-indigo-800">12 对</span>
                </button>
                <button class="difficulty-btn w-full py-3 px-4 rounded-xl border-2 border-gray-200 text-gray-600 font-bold focus:outline-none hover:border-indigo-300 transition flex justify-between items-center" onclick="selectDifficulty(15)">
                    <span>中等模式</span>
                    <span class="text-xs bg-gray-200 px-2 py-1 rounded text-gray-800">15 对</span>
                </button>
                <button class="difficulty-btn w-full py-3 px-4 rounded-xl border-2 border-gray-200 text-gray-600 font-bold focus:outline-none hover:border-indigo-300 transition flex justify-between items-center" onclick="selectDifficulty(18)">
                    <span>困难模式</span>
                    <span class="text-xs bg-gray-200 px-2 py-1 rounded text-gray-800">18 对</span>
                </button>
            </div>
        </div>

        <!-- 开始按钮 -->
        <button onclick="startGame()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transform hover:-translate-y-1 transition-all duration-200 text-lg">
            🚀 开始挑战
        </button>
        
        <div id="error-msg" class="mt-4 text-center text-red-500 text-sm hidden"></div>
    </div>

    <!-- ==================== 2. 游戏进行页 (Game Screen) ==================== -->
    <div id="game-screen" class="hidden w-[80%] max-w-6xl flex flex-col bg-white rounded-2xl shadow-2xl overflow-hidden">
        <!-- 顶部信息栏 -->
        <div class="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="exitGame()" class="bg-indigo-700 hover:bg-indigo-800 px-3 py-1 rounded text-sm transition">❌ 退出</button>
                <h2 id="game-title" class="text-xl font-bold tracking-wide">⚡ 匹配挑战</h2>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="text-center">
                    <span class="text-xs text-indigo-200 uppercase tracking-wider">进度</span>
                    <div class="font-mono text-xl font-bold"><span id="match-count">0</span> / <span id="total-pairs">0</span></div>
                </div>
                <div class="text-center">
                    <span class="text-xs text-indigo-200 uppercase tracking-wider">用时</span>
                    <div id="timer" class="font-mono text-xl font-bold">00:00</div>
                </div>
            </div>
        </div>

        <!-- 游戏主区域 (Grid 多列布局) -->
        <div class="flex-1 overflow-hidden flex p-2" style="min-height: 100px;">
            <!-- 左侧列 (题目项) - 使用 Grid 自动换行 -->
            <div class="w-1/2 bg-gray-50 border-r border-gray-200 p-3">
                <div id="col-left" class="grid gap-2 h-full w-full" style="grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); align-content: start;"></div>
            </div>

            <!-- 右侧列 (定义项) - 使用 Grid 自动换行 -->
            <div class="w-1/2 bg-white p-3">
                <div id="col-right" class="grid gap-2 h-full w-full" style="grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); align-content: start;"></div>
            </div>
        </div>

        <!-- 底部提示条 -->
        <div id="feedback-bar" class="h-10 bg-gray-100 border-t border-gray-200 flex items-center justify-center text-sm font-medium text-gray-500 shrink-0 transition-colors duration-300">
            请选择一组匹配的卡片
        </div>
    </div>

    <!-- ==================== 3. 结算页 (Result Screen) ==================== -->
    <div id="result-screen" class="hidden w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center">
        <div class="mb-6">
            <div class="text-6xl mb-2">🎉</div>
            <h2 class="text-2xl font-bold text-gray-800">挑战完成!</h2>
        </div>

        <div class="space-y-4 mb-8">
            <div class="bg-blue-50 p-4 rounded-xl flex justify-between items-center">
                <span class="text-gray-600 font-medium">⏱️ 总共用时</span>
                <span id="final-time" class="text-xl font-bold text-blue-600">00:00</span>
            </div>
            <div class="bg-green-50 p-4 rounded-xl flex justify-between items-center">
                <span class="text-gray-600 font-medium">⚡ 匹配效率</span>
                <span id="final-pairs" class="text-xl font-bold text-green-600">0 对/分钟</span>
            </div>
        </div>

        <div class="flex gap-4">
            <button onclick="resetGame(); showScreen('setup');" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-xl transition">
                🔙 再来一局
            </button>
        </div>
    </div>
    <footer class="relative z-10 text-center text-gray-400 text-xs py-3">
        &copy; 2026 fanfan.ai工作室
      </footer>

    <!-- ==================== 4. JavaScript 逻辑入口 ==================== -->
    <script>
        // ==================== API 配置 ====================
        const API_CONFIG = {
            apiKey: 'sk-xxx', // 注意：生产环境请勿暴露 Key
            endpoint: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',
            model: 'qwen3-max',
            timeout: 30000
        };

        // ==================== 游戏状态 ====================
        const state = {
            subject: 'english', // 'english' | 'math'
            difficulty: 12,     // 12 | 15 | 18
            isPlaying: false,
            cards: [],          // 存储所有卡片数据
            matchesFound: 0,
            timerInterval: null,
            seconds: 0,
            selectedCard: null  // 当前选中的卡片 DOM 元素
        };

        // ==================== UI 切换函数 ====================
        function showScreen(screenName) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            
            document.getElementById(`${screenName}-screen`).classList.remove('hidden');
        }

        // ==================== 0. 游戏重置函数 (新增) ====================
        function resetGame() {
            // 停止计时器
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
            
            // 重置状态变量
            state.matchesFound = 0;
            state.seconds = 0;
            state.isPlaying = false;
            state.selectedCard = null;
            state.cards = [];
            
            // 清理 UI 状态
            document.getElementById('match-count').textContent = '0';
            document.getElementById('timer').textContent = '00:00';
            document.getElementById('col-left').innerHTML = '';
            document.getElementById('col-right').innerHTML = '';
            
            // 重置反馈条
            const feedback = document.getElementById('feedback-bar');
            feedback.textContent = '请选择一组匹配的卡片';
            feedback.className = 'h-10 bg-gray-100 border-t border-gray-200 flex items-center justify-center text-sm font-medium text-gray-500 shrink-0 transition-colors duration-300';
        }

        // ==================== 1. 配置页逻辑 ====================
        function selectSubject(subject) {
            state.subject = subject;
            
            // 更新按钮样式
            document.querySelectorAll('.subject-btn').forEach(btn => {
                btn.classList.remove('border-indigo-500', 'bg-indigo-50', 'text-indigo-700', 'ring-2', 'ring-indigo-300');
                btn.classList.add('border-gray-200', 'text-gray-600');
            });
            
            const activeBtn = subject === 'english' ? document.getElementById('btn-subject-english') : document.getElementById('btn-subject-math');
            activeBtn.classList.remove('border-gray-200', 'text-gray-600');
            activeBtn.classList.add('border-indigo-500', 'bg-indigo-50', 'text-indigo-700', 'ring-2', 'ring-indigo-300');
        }

        function selectDifficulty(count) {
            state.difficulty = count;
            
            // 更新按钮样式
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('border-indigo-500', 'bg-indigo-50', 'text-indigo-700', 'ring-2', 'ring-indigo-300');
                btn.classList.add('border-gray-200', 'text-gray-600');
                // 重置右边角标颜色
                btn.querySelector('span:last-child').classList.remove('bg-indigo-200', 'text-indigo-800');
                btn.querySelector('span:last-child').classList.add('bg-gray-200', 'text-gray-800');
            });

            // 高亮当前点击的按钮
            event.currentTarget.classList.remove('border-gray-200', 'text-gray-600');
            event.currentTarget.classList.add('border-indigo-500', 'bg-indigo-50', 'text-indigo-700', 'ring-2', 'ring-indigo-300');
            event.currentTarget.querySelector('span:last-child').classList.remove('bg-gray-200', 'text-gray-800');
            event.currentTarget.querySelector('span:last-child').classList.add('bg-indigo-200', 'text-indigo-800');
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        // ==================== 2. 游戏核心逻辑 ====================
        async function startGame() {
            // 1. 先重置游戏状态
            resetGame();
            
            // 2. UI 切换
            showScreen('game');
            
            // 3. 初始化游戏状态
            state.matchesFound = 0;
            state.seconds = 0;
            state.isPlaying = true;
            state.selectedCard = null;
            
            // 更新顶部信息
            document.getElementById('game-title').textContent = state.subject === 'english' ? '🇬🇧 英语词汇挑战' : '🔢 数学概念挑战';
            document.getElementById('total-pairs').textContent = state.difficulty;
            document.getElementById('match-count').textContent = '0';
            document.getElementById('feedback-bar').textContent = 'AI正在生成题目，请稍候...';
            document.getElementById('feedback-bar').className = 'h-10 bg-gray-100 flex items-center justify-center text-sm font-medium text-gray-500';

            // 4. 获取题目数据
            try {
                const questions = await fetchQuestions(state.difficulty, state.subject);
                renderGame(questions);
                startTimer();
            } catch (e) {
                showError("生成题目失败: " + e.message);
                setTimeout(() => showScreen('setup'), 2000);
            }
        }

        function exitGame() {
            if(confirm("确定要退出游戏吗？当前进度将丢失。")) {
                resetGame();
                showScreen('setup');
            }
        }

        // ==================== 3. API 调用实现 ====================
        async function fetchQuestions(count, subject) {
            const prompt = subject === 'english' 
                ? `请生成 ${count} 对初中英语词汇配对题。请严格按照以下 JSON 格式输出，不要包含任何其他解释文字：\n[{"term": "英文单词", "definition": "中文释义"}]`
                : `请生成 ${count} 对初中数学概念配对题。请严格按照以下 JSON 格式输出，不要包含任何其他解释文字：\n[{"term": "数学概念名", "definition": "定义/公式"}]`;

            try {
                const response = await fetch(API_CONFIG.endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: API_CONFIG.model,
                        messages: [{ role: 'user', content: prompt }],
                        temperature: 0.1 // 低温度以保证格式稳定
                    })
                });

                if (!response.ok) throw new Error(`API Error: ${response.statusText}`);
                
                const data = await response.json();
                // 提取 content (兼容阿里云接口结构)
                let content = data.choices[0]?.message?.content;
                
                // 清理 AI 可能返回的 Markdown 格式 (如 ```json ... ```)
                if (content.includes('```')) {
                    content = content.replace(/```json/g, '').replace(/```/g, '').trim();
                }
                
                const questions = JSON.parse(content);
                
                if (questions.length !== count) {
                    console.warn(`Requested ${count} but got ${questions.length}`);
                }
                return questions;
            } catch (e) {
                console.error(e);
                throw new Error("无法获取题目，请检查网络或 API Key");
            }
        }

        // ==================== 辅助函数 ====================
        // Fisher-Yates 洗牌算法
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 英文发音
        function speakEnglish(text) {
            if ('speechSynthesis' in window) {
                // 停止正在播放的声音
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.9; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // ==================== 4. 渲染与交互实现 ====================
        function renderGame(questions) {
            const leftCol = document.getElementById('col-left');
            const rightCol = document.getElementById('col-right');
            leftCol.innerHTML = '';
            rightCol.innerHTML = '';
            
            // 准备数据
            // 左侧：问题项 (term)
            const leftItems = questions.map(q => ({
                id: q.term, // 用 term 作为 ID (假设 term 唯一)
                text: q.term,
                type: 'term'
            }));
            
            // 右侧：定义项 (definition)
            const rightItems = questions.map(q => ({
                id: q.term, // 关联 ID 指向左侧的 term
                text: q.definition,
                type: 'definition'
            }));

            // 洗牌
            const shuffledLeft = shuffleArray([...leftItems]);
            const shuffledRight = shuffleArray([...rightItems]);

            // 渲染函数
            const createCard = (item) => {
                const div = document.createElement('div');
                // 美化卡片样式：大尺寸、圆角、悬浮效果
                div.className = 'card p-4 px-4 bg-white border-2 border-gray-200 rounded-xl shadow-sm hover:shadow-lg hover:border-indigo-300 hover:-translate-y-1 cursor-pointer transition-all duration-200 select-none flex items-center justify-center text-center h-full w-full text-sm md:text-base font-medium text-gray-700 overflow-hidden break-words';
                div.textContent = item.text;
                div.dataset.matchId = item.id; // 绑定匹配 ID
                div.dataset.type = item.type;
                
                // 点击事件
                div.addEventListener('click', () => handleCardClick(div, item.text));
                
                return div;
            };

            shuffledLeft.forEach(item => leftCol.appendChild(createCard(item)));
            shuffledRight.forEach(item => rightCol.appendChild(createCard(item)));
            
            document.getElementById('feedback-bar').textContent = '游戏开始！点击左侧和右侧的卡片进行配对。';
        }

        // 核心交互逻辑
        function handleCardClick(element, text) {
            // 如果游戏已结束或卡片已匹配，忽略
            if (!state.isPlaying || element.classList.contains('matched')) return;

            // 英文发音：如果是英语，且点击的是左侧卡片
            if (state.subject === 'english' && element.parentElement.id === 'col-left') {
                speakEnglish(text);
            }

            // 1. 如果没有选中任何卡片
            if (!state.selectedCard) {
                state.selectedCard = element;
                element.classList.add('ring-2', 'ring-blue-400', 'bg-blue-50');
                return;
            }

            // 2. 如果点击的是同一个卡片，取消选中
            if (state.selectedCard === element) {
                state.selectedCard.classList.remove('ring-2', 'ring-blue-400', 'bg-blue-50');
                state.selectedCard = null;
                return;
            }

            // 3. 匹配判定
            const firstCard = state.selectedCard;
            const isMatch = firstCard.dataset.matchId === element.dataset.matchId;

            if (isMatch) {
                // 匹配成功
                // 移除选中态
                firstCard.classList.remove('ring-2', 'ring-blue-400', 'bg-blue-50');
                
                // 标记为已匹配 (变绿)
                firstCard.classList.add('bg-green-500', 'text-white', 'matched');
                element.classList.add('bg-green-500', 'text-white', 'matched');
                
                // 禁止再次点击
                firstCard.style.pointerEvents = 'none';
                element.style.pointerEvents = 'none';
                
                state.matchesFound++;
                document.getElementById('match-count').textContent = state.matchesFound;

                // 检查胜利
                if (state.matchesFound === state.difficulty) {
                    endGame();
                }
            } else {
                // 匹配失败
                // 移除选中态
                firstCard.classList.remove('ring-2', 'ring-blue-400', 'bg-blue-50');
                
                // 短暂变红提示
                firstCard.classList.add('bg-red-100');
                element.classList.add('bg-red-100');
                
                // 反馈提示
                const feedback = document.getElementById('feedback-bar');
                feedback.textContent = "匹配失败，再试一次！";
                feedback.classList.add('text-red-500');
                feedback.classList.remove('text-gray-500');

                setTimeout(() => {
                    firstCard.classList.remove('bg-red-100');
                    element.classList.remove('bg-red-100');
                    feedback.textContent = "请选择一组匹配的卡片";
                    feedback.classList.remove('text-red-500');
                    feedback.classList.add('text-gray-500');
                }, 400); // 400ms 后恢复
            }

            state.selectedCard = null;
        }

        // ==================== 计时器 ====================
        function startTimer() {
            clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                state.seconds++;
                const m = Math.floor(state.seconds / 60).toString().padStart(2, '0');
                const s = (state.seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${m}:${s}`;
            }, 1000);
        }

        function stopTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        // ==================== 结算逻辑 ====================
        function endGame() {
            state.isPlaying = false;
            stopTimer();
            
            // 延迟一点展示结果，体验更好
            setTimeout(() => {
                showScreen('result');
                
                // 计算耗时
                const m = Math.floor(state.seconds / 60).toString().padStart(2, '0');
                const s = (state.seconds % 60).toString().padStart(2, '0');
                document.getElementById('final-time').textContent = `${m}:${s}`;
                
                // 计算效率 (对/分钟)
                // 避免除以 0
                const timeMin = state.seconds > 0 ? state.seconds / 60 : 0.1;
                const efficiency = Math.round(state.difficulty / timeMin);
                document.getElementById('final-pairs').textContent = `${efficiency} 对/分钟`;
            }, 500);
        }

    </script>
</body>
</html>
