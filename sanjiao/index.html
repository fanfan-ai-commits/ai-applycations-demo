<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>单位圆与三角函数可视化</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white font-inter">
  <!-- 导航栏 -->
  <nav class="bg-slate-800/80 backdrop-blur-sm border-b border-slate-600/50 px-6 py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">📐</span>
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
          单位圆与三角函数可视化
        </h1>
      </div>
      <div class="flex items-center gap-2">
        <!-- AI 助手图标按钮 -->
        <button id="aiToggle" class="p-2 rounded-lg bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 transition-all transform hover:scale-105 shadow-lg">
          <span class="text-lg">🤖</span>
        </button>
        <!-- 主题切换按钮 -->
        <button id="themeToggle" class="p-2 rounded-lg bg-slate-600/70 hover:bg-slate-500 transition-colors">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="max-w-7xl mx-auto p-6">
    <div class="flex flex-col lg:flex-row gap-6">
      <!-- 左侧：单位圆画布 -->
      <section class="flex-1 bg-slate-800/50 backdrop-blur rounded-2xl p-6 border border-slate-600/50">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold text-slate-200">单位圆</h2>
          <div class="flex gap-2">
            <button id="playBtn" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
              <span id="playIcon">▶</span> 播放
            </button>
            <button id="resetBtn" class="px-3 py-1.5 bg-slate-600 hover:bg-slate-500 rounded-lg text-sm font-medium transition-colors">
              重置
            </button>
          </div>
        </div>
        
        <div class="relative flex justify-center">
          <canvas id="unitCircle" width="400" height="400" class="cursor-crosshair"></canvas>
        </div>

        <!-- 图例 -->
        <div class="mt-4 flex flex-wrap gap-4 justify-center text-sm">
          <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-pink-500"></span>
            <span class="text-slate-400">半径</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-green-400"></span>
            <span class="text-slate-400">sin</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-purple-400"></span>
            <span class="text-slate-400">cos</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span class="text-slate-400">角度</span>
          </div>
        </div>
      </section>

      <!-- 右侧：三角函数图表 -->
      <section class="flex-1 space-y-4">
        <div class="bg-slate-800/50 backdrop-blur rounded-2xl p-4 border border-slate-600/50">
          <div class="flex items-center justify-between mb-2">
            <h3 class="text-sm font-medium text-slate-300">sin(x)</h3>
            <span id="sinValue" class="text-green-400 font-mono">0.0000</span>
          </div>
          <canvas id="sinChart" class="function-canvas w-full"></canvas>
        </div>
        <div class="bg-slate-800/50 backdrop-blur rounded-2xl p-4 border border-slate-600/50">
          <div class="flex items-center justify-between mb-2">
            <h3 class="text-sm font-medium text-slate-300">cos(x)</h3>
            <span id="cosValue" class="text-purple-400 font-mono">1.0000</span>
          </div>
          <canvas id="cosChart" class="function-canvas w-full"></canvas>
        </div>
        <div class="bg-slate-800/50 backdrop-blur rounded-2xl p-4 border border-slate-600/50">
          <div class="flex items-center justify-between mb-2">
            <h3 class="text-sm font-medium text-slate-300">tan(x)</h3>
            <span id="tanValue" class="text-yellow-400 font-mono">0.0000</span>
          </div>
          <canvas id="tanChart" class="function-canvas w-full"></canvas>
        </div>
      </section>
    </div>

    <!-- 控制面板 -->
    <section class="mt-6 bg-slate-800/50 backdrop-blur rounded-2xl p-6 border border-slate-600/50">
      <div class="flex flex-col md:flex-row items-center gap-6">
        <div class="flex-1 w-full">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm text-slate-400">角度控制</span>
            <span class="text-sm text-slate-400">拖拽滑块或点击圆上点</span>
          </div>
          <input type="range" id="angleSlider" min="0" max="360" value="0" 
                 class="w-full h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer accent-blue-500">
        </div>
        
        <div class="flex flex-col sm:flex-row gap-4 text-sm">
          <div class="bg-slate-600/70 rounded-lg px-4 py-2">
            <span class="text-slate-400">角度: </span>
            <span id="angleDisplay" class="font-mono text-blue-400">0°</span>
          </div>
          <div class="bg-slate-600/70 rounded-lg px-4 py-2">
            <span class="text-slate-400">弧度: </span>
            <span id="radianDisplay" class="font-mono text-blue-400">0.000</span>
          </div>
        </div>
      </div>

      <!-- 公式展示 -->
      <div class="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div class="bg-slate-600/50 rounded-lg p-3 text-center">
          <span class="text-slate-400 text-sm">sin θ = </span>
          <span id="sinFormula" class="text-green-400 font-mono">y/r = 0</span>
        </div>
        <div class="bg-slate-600/50 rounded-lg p-3 text-center">
          <span class="text-slate-400 text-sm">cos θ = </span>
          <span id="cosFormula" class="text-purple-400 font-mono">x/r = 1</span>
        </div>
        <div class="bg-slate-600/50 rounded-lg p-3 text-center">
          <span class="text-slate-400 text-sm">tan θ = </span>
          <span id="tanFormula" class="text-yellow-400 font-mono">y/x = 0</span>
        </div>
      </div>
    </section>
  </main>

  <!-- AI 助手面板 (默认隐藏) -->
  <section id="aiPanel" class="fixed bottom-4 right-4 w-96 bg-slate-800/95 backdrop-blur rounded-2xl shadow-2xl border border-slate-600/50 overflow-hidden transform translate-y-0 transition-transform duration-300 z-50 hidden">
    <!-- 面板头部 -->
    <div class="p-4 border-b border-slate-600/50 bg-gradient-to-r from-purple-600/20 to-blue-600/20">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-xl">🤖</span>
          <h3 class="font-semibold text-slate-200">AI 三角函数助手</h3>
        </div>
        <button id="closeAI" class="p-1.5 hover:bg-slate-500/70 rounded-lg transition-colors">
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- 聊天消息区域 -->
    <div id="chatMessages" class="h-[450px] overflow-y-auto p-4 space-y-3 scrollbar-thin">
      <div class="bg-gradient-to-r from-purple-600/20 to-blue-600/20 rounded-lg p-3 text-sm text-slate-300 border border-purple-500/20">
        <p class="font-medium mb-1">✨ 你好！我是你的三角函数助手</p>
        <p class="text-slate-400">可以问我关于三角函数的问题，比如：</p>
        <ul class="mt-2 space-y-1 text-slate-400">
          <li>• 什么是 sin、cos、tan？</li>
          <li>• 30°、45°、60° 的三角函数值</li>
          <li>• 当前角度的三角函数含义</li>
        </ul>
      </div>
    </div>

    <!-- API Key 配置 (可选，如果需要更换 API Key) -->
    <div id="apiKeySection" class="px-4 pb-2">
      <div class="flex gap-2">
        <input type="password" id="apiKeyInput" placeholder="输入 DashScope API Key" 
               class="flex-1 bg-slate-600/70 rounded-lg px-3 py-2 text-sm border border-slate-600 focus:border-blue-500 focus:outline-none">
        <button id="saveApiKey" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium transition-colors">
          保存
        </button>
      </div>
    </div>

    <!-- 输入区域 -->
    <div class="p-4 border-t border-slate-600/50">
      <div class="flex gap-2">
        <input type="text" id="userInput" placeholder="输入问题..." 
               class="flex-1 bg-slate-600/70 rounded-xl px-4 py-2.5 text-sm border border-slate-600 focus:border-blue-500 focus:outline-none transition-colors">
        <button id="sendBtn" class="px-4 py-2.5 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 rounded-xl transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
          </svg>
        </button>
      </div>
    </div>
  </section>

  <script src="ai-service.js"></script>
  <script src="app.js"></script>
</body>
</html>
