<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电磁感应AI助手 - 高中物理学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen overflow-hidden" id="app-container">
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col flex-shrink-0">
            <div class="p-4 border-b border-gray-200">
                <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                    <span class="text-2xl">⚡</span>电磁感应助手
                </h1>
                <p class="text-xs text-gray-500 mt-1">高中物理 · AI一对一辅导</p>
            </div>
            <nav class="flex-1 overflow-y-auto p-4" id="topic-nav">
                <div class="space-y-1">
                    <div class="mb-4">
                        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">📖 基础概念</h3>
                        <button data-action="navigate" data-topic="flux" class="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-indigo-50 text-gray-700 transition-colors topic-btn active" data-topic="flux">🔵 磁通量 Φ</button>
                        <button data-action="navigate" data-topic="induction" class="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-indigo-50 text-gray-700 transition-colors topic-btn" data-topic="induction">⚡ 电磁感应现象</button>
                    </div>
                    <div class="mb-4">
                        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">📐 核心定律</h3>
                        <button data-action="navigate" data-topic="faraday" class="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-indigo-50 text-gray-700 transition-colors topic-btn" data-topic="faraday">📊 法拉第电磁感应定律</button>
                        <button data-action="navigate" data-topic="lenz" class="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-indigo-50 text-gray-700 transition-colors topic-btn" data-topic="lenz">🔄 楞次定律</button>
                        <button data-action="navigate" data-topic="right-hand" class="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-indigo-50 text-gray-700 transition-colors topic-btn" data-topic="right-hand">✋ 右手定则</button>
                    </div>
                </div>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0">
                        <span class="text-indigo-600 font-semibold">学</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-gray-700 truncate">高二学生</p>
                        <p class="text-xs text-gray-500">已学习 5/12</p>
                    </div>
                </div>
            </div>
        </aside>
        <main class="flex-1 flex flex-col overflow-hidden min-w-0">
            <header class="bg-white border-b border-gray-200 px-6 py-4 flex-shrink-0">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 id="current-topic" class="text-xl font-semibold text-gray-800">🔵 磁通量 Φ</h2>
                        <p id="current-subtitle" class="text-sm text-gray-500">理解磁通量的概念和计算方法</p>
                    </div>
                </div>
            </header>
            <div class="flex-1 overflow-hidden">
                <div class="flex h-full">
                    <div class="flex-1 p-2 overflow-y-auto min-w-0" id="teaching-area"></div>
                    <div class="w-96 bg-white border-l border-gray-200 flex flex-col flex-shrink-0">
                        <div class="p-4 border-b border-gray-200 flex-shrink-0">
                            <h3 class="font-semibold text-gray-800 flex items-center gap-2"><span class="text-xl">🤖</span>AI导师</h3>
                            <p class="text-xs text-gray-500 mt-1">有问题随时问我</p>
                        </div>
                        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
                            <div class="ai-message">
                                <div class="flex items-start gap-3">
                                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0"><span class="text-indigo-600 text-sm">🤖</span></div>
                                    <div class="bg-gray-100 rounded-2xl rounded-tl-none p-3 max-w-64">
                                        <p class="text-sm text-gray-700">你好！我是你的电磁感应学习助手。有什么不理解的地方可以问我，我会用通俗易懂的方式为你讲解。</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 border-t border-gray-200 flex-shrink-0">
                            <div class="flex gap-2">
                                <input type="text" id="user-input" placeholder="输入你的问题..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm">
                                <button id="send-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors flex items-center gap-2 flex-shrink-0"><span>发送</span></button>
                            </div>
                            <div class="mt-3 flex flex-wrap gap-2" id="quick-questions">
                                <button data-action="ask" data-question="什么是磁通量？" class="px-2 py-1 text-xs bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition-colors">什么是磁通量？</button>
                                <button data-action="ask" data-question="磁通量怎么计算？" class="px-2 py-1 text-xs bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition-colors">磁通量怎么计算？</button>
                                <button data-action="ask" data-question="楞次定律怎么用？" class="px-2 py-1 text-xs bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition-colors">楞次定律怎么用？</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="visualization-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl m-4">
            <div class="flex items-center justify-between p-4 border-b border-gray-200">
                <h3 id="modal-title" class="font-semibold text-gray-800">可视化演示</h3>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600 transition-colors">✕</button>
            </div>
            <div id="modal-content" class="p-2 overflow-y-auto max-h-[calc(90vh-80px)]"></div>
        </div>
    </div>
    <div id="toast" class="fixed bottom-24 right-6 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg hidden transform transition-all duration-300"><p id="toast-message" class="text-sm"></p></div>
    <div id="loading" class="fixed inset-0 bg-white/80 hidden items-center justify-center z-50">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 text-gray-600">AI正在思考...</p>
        </div>
    </div>
    <script src="js/physics-engine.js"></script>
    <script src="js/conversation.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 事件委托初始化 - 确保 DOM 加载完成后绑定
        document.addEventListener('DOMContentLoaded', function() {
            // 导航按钮点击
            document.getElementById('topic-nav').addEventListener('click', function(e) {
                if (e.target.dataset.action === 'navigate') {
                    const topic = e.target.dataset.topic;
                    if (typeof navigateToTopic === 'function') {
                        navigateToTopic(topic);
                    }
                }
            });
            
            // 发送按钮点击
            document.getElementById('send-btn').addEventListener('click', function() {
                if (typeof sendMessage === 'function') {
                    sendMessage();
                }
            });
            
            // 快捷问题点击
            document.getElementById('quick-questions').addEventListener('click', function(e) {
                if (e.target.dataset.action === 'ask') {
                    const question = e.target.dataset.question;
                    if (typeof askQuickQuestion === 'function') {
                        askQuickQuestion(question);
                    }
                }
            });
            
            // 关闭模态框
            document.getElementById('close-modal').addEventListener('click', function() {
                if (typeof closeModal === 'function') {
                    closeModal();
                }
            });
            
            // 输入框回车发送
            document.getElementById('user-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    if (typeof sendMessage === 'function') {
                        sendMessage();
                    }
                }
            });
        });
    </script>
</body>
</html>
