<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>诗云星图</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
      }
      #canvas-wrap {
        position: fixed;
        inset: 0;
      }
      #canvas-wrap canvas {
        display: block;
      }
      .hud-top {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        pointer-events: none;
      }
      .hud-top > * {
        pointer-events: auto;
      }
      .title {
        font-size: 1.65rem;
        font-weight: 600;
        letter-spacing: 0.35em;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 0 24px rgba(180, 210, 255, 0.35);
      }
      .dynasty-bar {
        display: flex;
        gap: 10px;
        padding: 10px 18px;
        border-radius: 14px;
        background: rgba(12, 14, 28, 0.55);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      }
      .dynasty-btn {
        min-width: 52px;
        padding: 8px 16px;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 0.95rem;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.06);
        transition: color 0.2s, background 0.2s, box-shadow 0.2s;
      }
      .dynasty-btn:hover {
        color: rgba(255, 255, 255, 0.85);
        background: rgba(255, 255, 255, 0.1);
      }
      .dynasty-btn.active {
        color: #fff;
        background: rgba(120, 160, 255, 0.25);
        box-shadow: 0 0 20px rgba(100, 160, 255, 0.25);
      }
      .hud-bottom {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        z-index: 10;
        min-width: 280px;
        max-width: min(92vw, 720px);
        padding: 12px 20px;
        border-radius: 12px;
        background: rgba(8, 10, 22, 0.65);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.75);
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        box-shadow: 0 0 10px currentColor;
      }
      .legend-row {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .hint {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 10;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.28);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="canvas-wrap"></div>
    <div class="hud-top">
      <!-- <h1 class="title">诗云星图</h1>
      <div class="dynasty-bar" aria-label="当前朝代">
        <button type="button" class="dynasty-btn active" disabled>唐</button>
      </div> -->
    </div>
    <!-- <div class="hud-bottom" id="status-bar">
      <span style="opacity: 0.5">悬停节点查看关联度</span>
    </div>
    <p class="hint">拖拽旋转 · 滚轮缩放</p> -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
          "d3-force-3d": "https://esm.sh/d3-force-3d@3.0.5?bundle"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
