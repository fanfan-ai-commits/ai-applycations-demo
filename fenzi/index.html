<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三维分子结构查看器 | AI 教育应用</title>
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e0e7ff; }
        ::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6366f1; }
        
        /* 分子列表项 */
        .molecule-item {
            transition: all 0.2s ease;
        }
        .molecule-item:hover {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.15) 0%, rgba(139, 92, 246, 0.1) 100%);
            border-left: 3px solid #6366f1;
        }
        .molecule-item.active {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.25) 0%, rgba(139, 92, 246, 0.15) 100%);
            border-left: 3px solid #8b5cf6;
        }
        
        /* 3D 画布 - 活泼的渐变背景 */
        #canvas-container {
            background: linear-gradient(135deg, #e0f2fe 0%, #fef3c7 50%, #fce7f3 100%);
        }
        
        /* 加载动画 */
        .loader {
            border: 3px solid #c7d2fe;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 工具提示 */
        .tooltip {
            position: absolute;
            background: rgba(99, 102, 241, 0.95);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        
        /* AI 加载动画 */
        .ai-loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #c7d2fe;
            border-top: 2px solid #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        /* AI 聊天区域 */
        #ai-chat {
            scrollbar-width: thin;
            scrollbar-color: #818cf8 #f5f3ff;
        }
        
        /* 按钮悬浮效果 */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        
        /* 输入框聚焦效果 */
        input:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 text-gray-700 h-screen overflow-hidden">
    
    <div class="flex h-screen">

                <div class="flex items-center gap-2">

        // ==================== 创建分子模型 ====================
        function createMolecule(moleculeKey) {
            const molecule = MOLECULES[moleculeKey];
            if (!molecule) return;
            
            if (moleculeGroup) {
                scene.remove(moleculeGroup);
                atomMeshes = [];
            }
            
            moleculeGroup = new THREE.Group();
            
            molecule.atoms.forEach((atom, index) => {
                const geometry = new THREE.SphereGeometry(atom.radius, 32, 32);
                const material = new THREE.MeshPhongMaterial({
                    color: atom.color,
                    shininess: 100,
                    specular: 0x444444
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(...atom.position);
                mesh.userData = { element: atom.element, index: index, molecule: moleculeKey };
                moleculeGroup.add(mesh);
                atomMeshes.push(mesh);
            });
            
            molecule.bonds.forEach(bond => {
                const fromAtom = molecule.atoms[bond.from];
                const toAtom = molecule.atoms[bond.to];
                
                const start = new THREE.Vector3(...fromAtom.position);
                const end = new THREE.Vector3(...toAtom.position);
                const direction = new THREE.Vector3().subVectors(end, start);
                const length = direction.length();
                
                const bondCount = Math.min(Math.round(bond.order), 3);
                const bondRadius = 0.06;
                const bondSpacing = 0.12;
                
                for (let i = 0; i < bondCount; i++) {
                    const offset = (i - (bondCount - 1) / 2) * bondSpacing;
                    
                    const geometry = new THREE.CylinderGeometry(bondRadius, bondRadius, length, 16);
                    const material = new THREE.MeshPhongMaterial({ color: 0x888888, shininess: 50 });
                    
                    const cylinder = new THREE.Mesh(geometry, material);
                    
                    const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
                    cylinder.position.copy(midpoint);
                    
                    const axis = new THREE.Vector3(0, 1, 0);
                    cylinder.quaternion.setFromUnitVectors(axis, direction.clone().normalize());
                    
                    if (bondCount > 1) {
                        const perpendicular = new THREE.Vector3(1, 0, 0);
                        if (Math.abs(direction.normalize().dot(perpendicular)) > 0.9) {
                            perpendicular.set(0, 1, 0);
                        }
                        const offsetDir = new THREE.Vector3().crossVectors(direction, perpendicular).normalize();
                        cylinder.position.add(offsetDir.multiplyScalar(offset));
                    }
                    
                    moleculeGroup.add(cylinder);
                }
            });
            
            scene.add(moleculeGroup);
            updateMoleculeInfo(moleculeKey);
        }

        // ==================== 生成分子列表 ====================
        function generateMoleculeList() {
            const listEl = document.getElementById('molecule-list');
            const searchInput = document.getElementById('search-input');
            
            function renderList(filter = '') {
                const filteredMolecules = Object.entries(MOLECULES).filter(([key, mol]) => {
                    return mol.name.includes(filter) || mol.formulaRaw.toLowerCase().includes(filter.toLowerCase());
                });
                
                listEl.innerHTML = filteredMolecules.map(([key, mol]) => `
                    <div class="molecule-item cursor-pointer px-3 py-2.5 rounded-xl mb-1.5 ${key === currentMolecule ? 'active' : ''}" data-molecule="${key}">
                        <div class="flex items-center justify-between">
                            <div>
                                <div class="font-medium text-gray-700 text-sm">${mol.name}</div>
                                <div class="text-xs text-indigo-400">${mol.formula}</div>
                            </div>
                            <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs bg-gradient-to-br from-indigo-400 to-purple-500 text-white font-medium">
                                ${mol.atoms.length}
                            </div>
                        </div>
                    </div>
                `).join('');
                
                document.querySelectorAll('.molecule-item').forEach(item => {
                    item.addEventListener('click', () => {
                        currentMolecule = item.dataset.molecule;
                        createMolecule(currentMolecule);
                        renderList(searchInput.value);
                    });
                });
            }
            
            renderList();
            
            searchInput.addEventListener('input', (e) => {
                renderList(e.target.value);
            });
        }

        // ==================== 鼠标事件 ====================
        function onMouseMove(event) {
            const container = document.getElementById('canvas-container');
            const rect = container.getBoundingClientRect();
            
            mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(atomMeshes);
            
            const tooltip = document.getElementById('tooltip');
            
            if (intersects.length > 0) {
                const atom = intersects[0].object;
                const atomData = atom.userData;
                const molecule = MOLECULES[atomData.molecule];
                
                tooltip.textContent = `${molecule.atoms[atomData.index].element} 原子`;
                tooltip.style.left = event.clientX - rect.left + 10 + 'px';
                tooltip.style.top = event.clientY - rect.top + 10 + 'px';
                tooltip.classList.remove('hidden');
                container.style.cursor = 'pointer';
            } else {
                tooltip.classList.add('hidden');
                container.style.cursor = 'grab';
            }
        }

        function onMouseClick(event) {
            const container = document.getElementById('canvas-container');
            const rect = container.getBoundingClientRect();
            
            mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(atomMeshes);
            
            if (intersects.length > 0) {
                const atom = intersects[0].object;
                const atomData = atom.userData;
                const molecule = MOLECULES[atomData.molecule];
                const atomInfo = molecule.atoms[atomData.index];
                alert(`${atomInfo.element} 原子\n位置: (${atomInfo.position.join(', ')})`);
            }
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // ==================== AI 问答功能 ====================
        async function handleAIQuestion() {
            const question = document.getElementById('ai-question').value.trim();
            if (!question) return;
            
            const molecule = MOLECULES[currentMolecule];
            const aiChat = document.getElementById('ai-chat');
            const askBtn = document.getElementById('ask-ai');
            
            // 用户问题 - 右侧
            aiChat.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-gradient-to-r from-indigo-500 to-purple-500 rounded-2xl p-3 max-w-[65%] text-sm shadow-md">
                        <p class="text-white">${question}</p>
                    </div>
                </div>
            `;
            
            const loadingId = 'loading-' + Date.now();
            // 加载提示 - 左侧
            aiChat.innerHTML += `
                <div class="flex justify-start">
                    <div id="${loadingId}" class="bg-gray-100 rounded-2xl p-3 text-sm">
                        <div class="flex items-center gap-2">
                            <span class="ai-loading"></span>
                            <span class="text-gray-500">AI 正在思考...</span>
                        </div>
                    </div>
                </div>
            `;
            aiChat.scrollTop = aiChat.scrollHeight;
            
            askBtn.disabled = true;
            askBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            try {
                const systemPrompt = `你是一位专业的化学老师，专门解答关于分子结构的问题。
当前查看的分子是：${molecule.name}（化学式：${molecule.formula}）
分子信息：
- 分子量：${molecule.molecularWeight} g/mol
- 空间构型：${molecule.geometry}
- 键长信息：${molecule.bondLengths.map(b => `${b.atoms}: ${b.value}`).join(', ')}
- 键角信息：${molecule.angles.map(a => `${a.atoms.map(i => molecule.atoms[i].element).join('-')}: ${a.value}`).join(', ') || '无'}
- 分子性质：${molecule.description}

请用简洁、易懂的语言回答用户的问题。如果问题与当前分子无关，请礼貌地引导用户询问与该分子相关的问题。`;

                const response = await fetch(API_CONFIG.endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: API_CONFIG.model,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: question }
                        ],
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                if (!response.ok) throw new Error(`API 请求失败: ${response.status}`);

                const data = await response.json();
                const aiResponse = data.choices?.[0]?.message?.content || '抱歉，我暂时无法回答这个问题。';
                
                document.getElementById(loadingId)?.remove();
                
                // AI 回答 - 左侧
                aiChat.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-white border border-indigo-100 rounded-2xl p-3 max-w-[65%] text-sm shadow-sm">
                            <p class="text-gray-700">${aiResponse.replace(/\n/g, '<br>')}</p>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('AI API Error:', error);
                document.getElementById(loadingId)?.remove();
                
                // 错误提示 - 左侧
                aiChat.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-red-50 border border-red-100 rounded-2xl p-3 text-sm">
                            <p class="text-red-500">抱歉，AI 服务暂时不可用。</p>
                        </div>
                    </div>
                `;
            }
            
            askBtn.disabled = false;
            askBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('ai-question').value = '';
            aiChat.scrollTop = aiChat.scrollHeight;
        }

        document.getElementById('ask-ai').addEventListener('click', handleAIQuestion);
        document.getElementById('ai-question').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAIQuestion();
        });

        // ==================== 初始化应用 ====================
